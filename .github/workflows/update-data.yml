name: Update FF data mirror

# 把 ForexFactory 本周数据抓取并提交到仓库（ff_data.json），
# 作为国内手机访问稳定的镜像兜底。手机端小部件主源拉不到时会读这个文件。
on:
  push:
    branches: [ main ]
  schedule:
    # 每周一 00:17 UTC 更新一次（美东周日晚上，覆盖新的一周）
    - cron: '17 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch ForexFactory calendar
        run: |
          curl -sSL -A "Mozilla/5.0" \
            "https://nfs.faireconomy.media/ff_calendar_thisweek.json" \
            -o ff_data.json
          echo "bytes=$(wc -c < ff_data.json)"

      - name: Commit mirror
        run: |
          git config user.email "ff-bot@users.noreply.github.com"
          git config user.name "ff-bot"
          git add ff_data.json
          if git diff --cached --quiet; then
            echo "no change, skip"
          else
            git commit -m "data: weekly ForexFactory calendar mirror update"
            git push
          fi
